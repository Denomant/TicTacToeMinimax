name: Gradle Test And Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Test and build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./Zaltsberg_ICS3U_RST
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Run tests
      run: |
        ./gradlew test

    - name: Build app image
      run: ./gradlew appImage

    - name: Archive app image (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cd build/jpackage/image
        zip -r ../TicTacToe-${{ runner.os }}.zip .

    - name: Archive app image (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Compress-Archive -Path build\jpackage\image\* -DestinationPath build\jpackage\TicTacToe-Windows.zip

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: TicTacToe-${{ runner.os }}
        path: Zaltsberg_ICS3U_RST/build/jpackage/TicTacToe-${{ runner.os }}.zip
        if-no-files-found: error

    